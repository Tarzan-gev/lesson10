<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* Общие стили */
        body {
            background-color: #f8f9fa;
        }
        .topbar {
            background-color: #212529;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            position: fixed;
            left: 20px;
            top: 80px;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
        .activation-bar {
            background-color: #1a1e21;
            color: #fff;
            padding: 5px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.85rem;
        }
        .btn-edit {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .btn-add {
            background: none;
            color: #007bff;
            border: none;
            padding: 8px 20px;
            font-weight: 500;
        }
        .btn-add:hover {
            text-decoration: underline;
        }

        /* Стили формы (из create_user.html) */
        .form-container {
            width: 350px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-label {
            display: block;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        .form-control {
            height: 30px;
            font-size: 14px;
            text-align: center;
        }
        .highlight {
            background-color: #fff3cd !important;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .modal .form-container {
            box-shadow: none;
            padding: 0;
            width: 100%;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <strong id="currentUserEmail">Loading...</strong> with roles: <span id="currentUserRoles">Loading...</span>
        </span>
        <form action="/logout" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="sidebar">
    <a href="/admin/users" class="active">Admin</a>
    <a href="/user">User</a>
</div>

<div class="main-content">
    <h1>Admin panel</h1>
    <div class="d-flex align-items-center mb-3">
        <span class="fw-bold me-3">Users table</span>
        <button class="btn-add btn-sm" id="newUserBtn">New User</button>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для создания/редактирования -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add New User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">

                    <!-- Блок с ID — скрыт по умолчанию, показывается только при редактировании -->
                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input type="text" id="userIdReadonly" class="form-control" readonly>
                    </div>
                    <input type="hidden" id="Id" />

                    <!-- Поле First name -->
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" id="firstName" class="form-control highlight" required>
                    </div>

                    <!-- Поле Last name -->
                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" id="lastName" class="form-control highlight" required>
                    </div>

                    <!-- Поле Age -->
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" id="age" class="form-control" required>
                    </div>

                    <!-- Поле Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control highlight" required>
                    </div>

                    <!-- Поле Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Leave blank to keep current">
                    </div>

                    <!-- Поле Role -->
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select multiple id="rolesSelect" class="form-select" size="2"></select>
                    </div>
                </form>
            </div>
            <div class="modal-footer justify-content-end">
                <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Close</button>
                <button type="submit" form="userForm" class="btn btn-primary" id="saveUserBtn">Edit</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- ID по центру сверху -->
                <div class="text-center mb-4">
                    <h6 class="text-muted">ID</h6>
                    <h4 id="deleteUserId" class="text-danger"></h4>
                </div>

                <!-- Поле First name -->
                <div class="mb-3">
                    <label class="form-label">First name</label>
                    <div id="deleteFirstName" class="form-control-plaintext"></div>
                </div>

                <!-- Поле Last name -->
                <div class="mb-3">
                    <label class="form-label">Last name</label>
                    <div id="deleteLastName" class="form-control-plaintext"></div>
                </div>

                <!-- Поле Age -->
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <div id="deleteAge" class="form-control-plaintext"></div>
                </div>

                <!-- Поле Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div id="deleteEmail" class="form-control-plaintext"></div>
                </div>

                <!-- Поле Role -->
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <div id="deleteRoles" class="form-control-plaintext"></div>
                </div>
            </div>
            <div class="modal-footer justify-content-end">
                <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>
<script>
    // API объект
    const userFetch = {
        head: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        findAllUsers: () => fetch('/api/users'),
        findUserByUsername: () => fetch('/api/user/current'),
        findOneUser: (id) => fetch(`/api/users/${id}`),
        addNewUser: (user) => fetch('/api/users', { method: 'POST', headers: userFetch.head, body: JSON.stringify(user) }),
        updateUser: (user, id) => fetch(`/api/users/${id}`, { method: 'PUT', headers: userFetch.head, body: JSON.stringify(user) }),
        deleteUser: (id) => fetch(`/api/users/${id}`, { method: 'DELETE', headers: userFetch.head })
    };

    let allRoles = [];

    async function loadCurrentUser() {
        try {
            const res = await userFetch.findUserByUsername();

            if (!res.ok) {
                throw new Error(`HTTP error! status: ${res.status}`);
            }

            const user = await res.json();

            // Заполняем email
            document.getElementById('currentUserEmail').textContent = user.email || 'Unknown';

            // Обрабатываем роли: убираем префикс ROLE_ и объединяем через пробел
            const rolesText = user.authorities && user.authorities.length > 0
                ? user.authorities
                    .map(r => r.authority.replace('ROLE_', ''))
                    .join(' ')
                : 'N/A';
            document.getElementById('currentUserRoles').textContent = rolesText;

            console.log('Current user loaded:', user);
        } catch (error) {
            console.error('Error loading current user:', error);
            document.getElementById('currentUserEmail').textContent = 'Unknown';
            document.getElementById('currentUserRoles').textContent = 'N/A';
        }
    }

    // Загрузка ролей
    async function loadRoles() {
        try {
            const res = await fetch('/api/roles');
            if (!res.ok) throw new Error('Failed to load roles');
            allRoles = await res.json();
            const select = document.getElementById('rolesSelect');
            select.innerHTML = allRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        } catch (error) {
            console.error('Error loading roles:', error);
        }
    }

    // Загрузка пользователей в таблицу
    async function loadUsers() {
        try {
            const res = await userFetch.findAllUsers();
            if (!res.ok) throw new Error('Failed to load users');
            const users = await res.json();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            users.forEach(user => {
                const row = tbody.insertRow();

                // 1. ID
                row.insertCell(0).textContent = user.id;

                // 2. First Name
                row.insertCell(1).textContent = user.name || '';

                // 3. Last Name
                row.insertCell(2).textContent = user.surname || '';

                // 4. Age
                row.insertCell(3).textContent = user.age || '';

                // 5. Email
                row.insertCell(4).textContent = user.email || '';

                // 6. Role — корректная обработка ролей
                let rolesText = '';

                // Проверяем разные возможные поля с ролями
                if (user.roles) {
                    // Если есть поле roles (массив объектов с полем name)
                    rolesText = user.roles
                        .map(role => role.name.replace('ROLE_', ''))
                        .join(' ');
                } else if (user.authorities) {
                    // Если есть поле authorities (массив объектов с полем authority)
                    rolesText = user.authorities
                        .map(auth => auth.authority.replace('ROLE_', ''))
                        .join(' ');
                } else {
                    // Если нет ни одного из полей — ставим заглушку
                    rolesText = 'N/A';
                }

                row.insertCell(5).textContent = rolesText;

                // 7. Edit button
                const editCell = row.insertCell(6);
                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.className = 'btn-edit';
                editBtn.onclick = () => openEditModal(user.id);
                editCell.appendChild(editBtn);

                // 8. Delete button
                const deleteCell = row.insertCell(7);
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.className = 'btn-delete';
                deleteBtn.onclick = () => openDeleteModal(user.id);
                deleteCell.appendChild(deleteBtn);
            });
        } catch (error) {
            console.error('Error loading users:', error);
            document.getElementById('userTableBody').innerHTML = `
            <tr><td colspan="8" class="text-danger text-center">Error loading users: ${error.message}</td></tr>
        `;
        }
    }

    // Открыть модальное окно создания
    function openCreateModal() {
        document.getElementById('modalTitle').textContent = 'Add New User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.querySelectorAll('#rolesSelect option').forEach(opt => opt.selected = false);
        const saveBtn = document.getElementById('saveUserBtn');
        saveBtn.textContent = 'Add new user';
        saveBtn.onclick = (e) => { e.preventDefault(); createUser(); };
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    // Создание пользователя
    async function createUser() {
        const data = {
            name: document.getElementById('firstName').value,
            surname: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            roleIds: Array.from(document.querySelectorAll('#rolesSelect option:checked')).map(opt => parseInt(opt.value))
        };
        try {
            const response = await userFetch.addNewUser(data);
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                await loadUsers();
            } else {
                const err = await response.json().catch(() => ({}));
                alert('Error: ' + (err.error || 'Something went wrong'));
            }
        } catch (error) {
            alert('Error creating user: ' + error.message);
        }
    }

    // Открыть модальное окно редактирования
    async function openEditModal(userId) {
        try {
            const res = await userFetch.findOneUser(userId);
            if (!res.ok) throw new Error('User not found');
            const user = await res.json();

            // 1. Обновляем заголовок модального окна
            document.getElementById('modalTitle').textContent = 'Edit user';

            // 2. Заполняем видимое поле ID (только для чтения)
            document.getElementById('userIdReadonly').value = user.id;

            // 3. Заполняем скрытое поле ID (для отправки на бэкенд)
            document.getElementById('userId').value = user.id;

            // 4. Заполняем остальные поля формы
            document.getElementById('firstName').value = user.name || '';
            document.getElementById('lastName').value = user.surname || '';
            document.getElementById('age').value = user.age || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('password').value = ''; // Оставляем поле пароля пустым

            // 5. Настраиваем роли
            const roleIds = user.roles ? user.roles.map(r => r.id) : [];
            const select = document.getElementById('rolesSelect');
            for (let i = 0; i < select.options.length; i++) {
                select.options[i].selected = roleIds.includes(parseInt(select.options[i].value));
            }

            // 6. Настраиваем кнопку «Edit»
            const saveBtn = document.getElementById('saveUserBtn');
            saveBtn.textContent = 'Edit';
            saveBtn.onclick = (e) => {
                e.preventDefault();
                updateUser();
            };

            // 7. Показываем модальное окно
            new bootstrap.Modal(document.getElementById('userModal')).show();
        } catch (error) {
            console.error('Error loading user for edit:', error);
            alert('Error loading user data for editing: ' + error.message);
        }
    }
    // Обновление пользователя
    async function updateUser() {
        const userId = document.getElementById('userId').value;
        const data = {
            name: document.getElementById('firstName').value,
            surname: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            roleIds: Array.from(document.querySelectorAll('#rolesSelect option:checked')).map(opt => parseInt(opt.value))
        };

        try {
            const response = await userFetch.updateUser(data, userId);
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                await loadUsers();
            } else {
                const err = await response.json().catch(() => ({}));
                alert('Error: ' + (err.error || 'Something went wrong'));
            }
        } catch (error) {
            alert('Error updating user: ' + error.message);
        }
    }

    // Открыть модальное окно удаления
    async function openDeleteModal(userId) {
        try {
            const res = await userFetch.findOneUser(userId);
            if (!res.ok) throw new Error('User not found');
            const user = await res.json();

            // Заполняем данные в модальном окне удаления
            document.getElementById('deleteUserId').textContent = user.id;
            document.getElementById('deleteFirstName').textContent = user.name || 'N/A';
            document.getElementById('deleteLastName').textContent = user.surname || 'N/A';
            document.getElementById('deleteAge').textContent = user.age || 'N/A';
            document.getElementById('deleteEmail').textContent = user.email || 'N/A';

            // Форматируем роли в виде списка
            const rolesText = user.roles
                ? user.roles.map(r => r.name).join('\n')
                : 'N/A';
            document.getElementById('deleteRoles').textContent = rolesText;

            // Настраиваем кнопку удаления
            const deleteBtn = document.getElementById('confirmDeleteBtn');
            deleteBtn.onclick = async () => {
                try {
                    const response = await userFetch.deleteUser(userId);
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                        await loadUsers();
                    } else {
                        alert('Error deleting user');
                    }
                } catch (error) {
                    alert('Error during deletion: ' + error.message);
                }
            };

            // Показываем модальное окно
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        } catch (error) {
            console.error('Error loading user for delete:', error);
            alert('Error loading user data for deletion: ' + error.message);
        }
    }

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('newUserBtn').onclick = openCreateModal;

        // Загружаем данные при старте
        loadCurrentUser();
        loadRoles();
        loadUsers();
    });
</script>
</body>
</html>
