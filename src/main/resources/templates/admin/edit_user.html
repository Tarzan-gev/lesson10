<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1>Edit user</h1>
    <form id="editUserForm">
        <input type="hidden" id="userId">
        <div class="mb-3"><label class="form-label">ID</label><input type="text" id="userIdReadonly" class="form-control" readonly></div>
        <div class="mb-3"><label class="form-label">First name</label><input type="text" id="firstName" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Last name</label><input type="text" id="lastName" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Age</label><input type="number" id="age" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" placeholder="Leave blank to keep current"></div>
        <div class="mb-3"><label class="form-label">Role</label>
            <select multiple id="rolesSelect" class="form-select" size="2"></select>
        </div>
        <div class="d-flex gap-2">
            <a href="/admin/users" class="btn btn-secondary">Close</a>
            <button type="submit" class="btn btn-primary">Edit</button>
        </div>
    </form>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    if (userId) {
        fetch(`/api/users/${userId}`)
            .then(res => res.json())
            .then(user => {
                document.getElementById('userId').value = user.id;
                document.getElementById('userIdReadonly').value = user.id;
                document.getElementById('firstName').value = user.name;
                document.getElementById('lastName').value = user.surname;
                document.getElementById('age').value = user.age;
                document.getElementById('email').value = user.email;
                return fetch('/api/roles');
            })
            .then(res => res.json())
            .then(roles => {
                const select = document.getElementById('rolesSelect');
                select.innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
                // предварительно выбранные роли будут установлены после загрузки пользователя (но они уже есть)
                // поэтому нужно подгрузить пользователя ещё раз? проще загрузить сначала
            });
    }
    document.getElementById('editUserForm').onsubmit = async (e) => {
        e.preventDefault();
        const userId = document.getElementById('userId').value;
        const data = {
            name: document.getElementById('firstName').value,
            surname: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            roleIds: Array.from(document.querySelectorAll('#rolesSelect option:checked')).map(opt => parseInt(opt.value))
        };
        const response = await fetch(`/api/users/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (response.ok) {
            window.location.href = '/admin/users';
        } else {
            const err = await response.json();
            alert('Error: ' + (err.error || 'Something went wrong'));
        }
    };
</script>
</body>
</html>
