<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            position: fixed;
            left: 20px;
            top: 80px;
            z-index: 100;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            margin-left: 240px;
        }
        .top-info-bar {
            background-color: #212529;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
            margin-left: -240px;
            margin-right: -20px;
            width: calc(100% + 240px + 20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-outline-light {
            color: white;
            border-color: white;
            background: transparent;
            border: 1px solid white;
            border-radius: 4px;
            padding: 4px 12px;
        }
        .btn-outline-light:hover {
            background-color: white;
            color: #212529;
        }
        .bottom-bar {
            background-color: #1a1e21;
            color: #fff;
            padding: 5px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.85rem;
            z-index: 1000;
        }
        .role-text {
            display: inline-block;
            margin-right: 5px;
            color: #000;
        }
    </style>
</head>
<body class="bg-light">
<div class="sidebar" id="userSidebar">
    <a href="/user" class="active">User</a>
</div>
<div class="sidebar" id="adminSidebar" style="display: none;">
    <a href="/admin/users">Admin</a>
    <a href="/user" class="active">User</a>
</div>
<div class="main-content">
    <div class="top-info-bar">
        <span><strong id="userEmail"></strong> with roles : <span id="userRoles"></span></span>
        <form action="/logout" method="post" class="m-0">
            <button type="submit" class="btn-outline-light">Logout</button>
        </form>
    </div>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header"><h4 class="mb-0">User information-page</h4></div>
            <div class="card-body">
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                    <tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Age</th><th>Email</th><th>Role</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="bottom-bar">Активация Windows. Чтобы активировать Windows, перейдите в раздел "Параметры".</div>

<script>
    async function loadUserProfile() {
        try {
            const response = await fetch('/api/user/current');
            const user = await response.json();
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userRoles').innerText = user.roles.map(r => r.name).join(' ');

            const isAdmin = user.roles.some(r => r.name === 'ADMIN');
            if (isAdmin) {
                document.getElementById('userSidebar').style.display = 'none';
                document.getElementById('adminSidebar').style.display = 'block';
            }

            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.name)}</td>
                    <td>${escapeHtml(user.surname)}</td>
                    <td>${user.age}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${user.roles.map(r => `<span class="role-text">${r.name}</span>`).join(' ')}</td>
                </tr>
            `;
        } catch (error) {
            console.error('Error loading user profile:', error);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    loadUserProfile();
</script>
</body>
</html>
