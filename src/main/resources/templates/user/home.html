<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>User Page</title>
    <!-- Подключение Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        /* Верхняя черная панель */
        .topbar {
            background-color: #343a40;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Стили для ссылки Logout */
        .topbar a {
            color: white;
            text-decoration: none;
            font-weight: normal;
        }
        /* Левая панель */
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            height: 100vh;
            position: fixed;
            padding-top: 10px;
        }
        .sidebar a {
            display: block;
            padding: 12px 20px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        /* Синяя активная кнопка User */
        .sidebar .active {
            background-color: #0d6efd;
            color: white !important;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
        .table-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<div class="topbar">
    <span id="user-info">Loading user info...</span>
    <a th:href="@{/logout}">Logout</a>
</div>

<!-- Левая панель -->
<div class="sidebar">
    <a href="#" class="active">User</a>
    <a id="admin-link" style="display: none;" href="/admin/home">Admin</a>
</div>

<!-- Основной контент -->
<div class="content">
    <h2>User information page</h2>

    <div class="table-container mt-3">
        <h4>About user</h4>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Surname</th>
                <th>Age</th>
                <th>Email</th>
                <th>Roles</th>
            </tr>
            </thead>
            <tbody id="user-data">
            <tr>
                <td colspan="6" class="text-center">Loading data...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Запрос к API для получения данных текущего пользователя
        fetch('/api/user/current')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(userData => {
                // Извлекаем email
                const email = userData.email || 'Unknown';

                // Обрабатываем роли: берём из authorities, убираем префикс ROLE_, объединяем через пробел
                const roles = userData.authorities && userData.authorities.length > 0
                    ? userData.authorities
                        .map(role => role.authority.replace('ROLE_', ''))
                        .join(' ')
                    : 'N/A';

                // Обновляем информацию в верхней панели
                document.getElementById('user-info').textContent = `${email} with roles: ${roles}`;

                // Показываем ссылку на админ‑панель, если у пользователя есть роль ADMIN
                if (userData.authorities && userData.authorities.some(role =>
                    role.authority === 'ROLE_ADMIN')) {
                    document.getElementById('admin-link').style.display = 'block';
                }

                // Заполняем таблицу данными пользователя
                const userDataRow = document.getElementById('user-data');
                userDataRow.innerHTML = `
                <tr>
                    <td>${userData.id || 'N/A'}</td>
                    <td>${userData.name || 'N/A'}</td>
            <td>${userData.surname || 'N/A'}</td>
            <td>${userData.age || 'N/A'}</td>
            <td>${email}</td>
            <td>${roles}</td>
                </tr>
            `;
            })
            .catch(error => {
                console.error('Error fetching user data:', error);
                document.getElementById('user-data').innerHTML = `
                <tr>
                    <td colspan="6" class="text-danger text-center">
                        Error loading user data. Please try again later.
                    </td>
                </tr>
            `;
                document.getElementById('user-info').textContent = 'Unknown with roles: N/A';
            });
    });
</script>

</body>
</html>
